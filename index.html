<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arturo Delgado · AR Card</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; overflow: hidden; background: #000; }

    /* Forzar cámara a ocupar TODA la pantalla */
    .mindar-ui-overlay { z-index: 100; }
    #ar-scene { width: 100vw; height: 100vh; }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at top, #0a1628 0%, #000 70%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 30px; text-align: center; color: #fff;
    }
    .logo-splash {
      width: 80px; height: 80px; border-radius: 20px;
      background: linear-gradient(135deg, #00bcd4, #0d47a1);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 900; color: #fff;
      box-shadow: 0 0 30px rgba(0,188,212,.5);
    }
    #startBtn {
      padding: 16px 40px; border: none; border-radius: 50px;
      background: linear-gradient(90deg, #00bcd4, #7c4dff);
      color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
    }

    #social-bar {
      position: fixed; bottom: 20px; left: 0; right: 0;
      display: none; justify-content: center; gap: 10px; z-index: 500; flex-wrap: wrap;
    }
    .s-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 15px; border-radius: 25px;
      font-size: .85rem; font-weight: 700; color: #fff; text-decoration: none;
    }
    .s-btn.wa { background: #1da851; }
    .s-btn.ig { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
    .s-btn.web { background: #1565c0; }

    #hint {
      position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.7); color: #fff; padding: 10px 20px;
      border-radius: 30px; font-size: .8rem; display: none; z-index: 500;
    }
    vercel-live, .vercel-toolbar, #vercel-toolbar { display: none !important; }
  </style>
</head>
<body>

<div id="splash">
  <div class="logo-splash">A</div>
  <h1 style="font-size: 1.5rem;">Arturo Delgado</h1>
  <button id="startBtn" onclick="startAR()">🚀 Activar Realidad Aumentada</button>
</div>

<div id="social-bar">
  <a class="s-btn wa" href="https://wa.me/50686099810" target="_blank">WhatsApp</a>
  <a class="s-btn ig" href="https://www.instagram.com/adelgadful_/" target="_blank">Instagram</a>
  <a class="s-btn web" href="https://adelgadful.vercel.app/" target="_blank">🌐 Mi Web</a>
</div>

<div id="hint">📷 Apunta al frente de tu tarjeta</div>

<a-scene 
  id="ar-scene"
  mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no;" 
  embedded 
  color-management="true" 
  renderer="colorManagement: true, logarithmicDepthBuffer: true, antialias: true" 
  vr-mode-ui="enabled: false" 
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="avatar-glb" src="model.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-gltf-model
      src="#avatar-glb"
      position="0 0 -0.2" 
      rotation="0 -180 0" 
      scale="1.2 1.2 1.2"
      animation-mixer>
    </a-gltf-model>

    <a-text value="Adelgadful" position="0 0.8 -0.2" align="center" color="#00bcd4" width="2.5"></a-text>
  </a-entity>
</a-scene>

<script>
  function startAR() {
    document.getElementById('splash').style.display = 'none';
    const sceneEl = document.querySelector('a-scene');
    const arSystem = sceneEl.systems["mindar-image-system"];
    
    // Iniciamos MindAR manualmente para asegurar pantalla completa
    arSystem.start(); 

    document.getElementById('social-bar').style.display = 'flex';
    document.getElementById('hint').style.display = 'block';
  }

  const target = document.getElementById('target');
  const hint = document.getElementById('hint');
  target.addEventListener('targetFound', () => { 
    hint.innerHTML = "✅ ¡Tarjeta detectada!";
    hint.style.background = "rgba(0, 230, 118, 0.8)";
  });
  target.addEventListener('targetLost', () => { 
    hint.innerHTML = "📷 Apunta al frente de tu tarjeta";
    hint.style.background = "rgba(0,0,0,0.7)";
  });
</script>
</body>
</html>
