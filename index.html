<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arturo Delgado · AR Card</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at top, #0a1628 0%, #000 70%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 30px; text-align: center; color: #fff;
    }
    .logo-splash {
      width: 90px; height: 90px; border-radius: 22px;
      background: linear-gradient(135deg, #00bcd4, #0d47a1);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: 900; color: #fff;
      box-shadow: 0 0 40px rgba(0,188,212,.5);
      animation: float 3s ease-in-out infinite;
    }
    #splash h1 {
      font-size: 1.7rem; font-weight: 800;
      background: linear-gradient(90deg, #00bcd4, #7c4dff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #startBtn {
      padding: 16px 44px; border: none; border-radius: 50px;
      background: linear-gradient(90deg, #00bcd4, #7c4dff);
      color: #fff; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 0 30px rgba(124,77,255,.5);
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

    #hint {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.65); color: #fff; padding: 9px 22px; border-radius: 20px;
      font-size: .82rem; z-index: 500; display: none;
    }
    /* El canvas de la escena debe recibir pointer events */
    #ar-scene canvas { pointer-events: auto !important; }
  </style>
</head>
<body>

<div id="splash">
  <div class="logo-splash">A</div>
  <h1>Arturo Delgado</h1>
  <p>Servicios Digitales e Impresión</p>
  <button id="startBtn" onclick="startAR()">🚀 Activar Realidad Aumentada</button>
</div>

<div id="hint">📷 Apunta al marcador Hiro de tu tarjeta</div>

<script>
// FIX CRÍTICO: Soluciona corrupción de texturas/fading en glTF
AFRAME.registerComponent('loaded-model', {
  init: function () {
    this.el.addEventListener('model-loaded', (e) => {
      e.detail.model.traverse((node) => {
        if (node.isMesh) { node.material.encoding = 3001; } // Gamma
      });
    });
  }
});

AFRAME.registerComponent('wave-greeting', {
  init: function () {
    this.armBone = null;
    const targets = ['RightArm','mixamorigRightArm','RightForeArm','Arm_R','RightUpperArm'];
    this.el.addEventListener('model-loaded', (ev) => {
      ev.detail.model.traverse((node) => {
        if (!this.armBone && targets.some(t => node.name.toLowerCase().includes(t.toLowerCase()))) { 
          this.armBone = node; 
        }
      });
    });
  },
  tick: function (t) {
    if (this.armBone) {
      // Saludo más suave y natural
      this.armBone.rotation.z = Math.sin(t * 0.003) * 0.7;
    }
  }
});
</script>

<a-scene id="ar-scene" style="display:none"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;">

  <a-assets>
    <img id="ig-tex" src="instagram_png_.jpg" crossorigin="anonymous">
    <img id="wa-tex" src="whatapp_png_.png" crossorigin="anonymous">
    <img id="web-tex" src="https://cdn0.iconfinder.com/data/icons/basic-ui-6/128/website_url_hyperlink-128.png" crossorigin="anonymous">
    <a-asset-item id="avatar-glb" src="model.glb"></a-asset-item>
  </a-assets>

  <a-marker preset="hiro" id="marker">
    
    <a-gltf-model
      id="avatar"
      src="#avatar-glb"
      loaded-model position="0 0.2 0.5" 
      rotation="-40 0 0" 
      scale="2.5 2.5 2.5"
      wave-greeting>
    </a-gltf-model>

    <a-text value="Adelgadful" position="0 3.8 0" align="center" color="#00bcd4" scale="1.2 1.2 1.2"></a-text>
    <a-text value="Servicios Digitales" position="0 3.4 0" align="center" color="#fff" scale="0.6 0.6 0.6"></a-text>

    <a-plane class="ar-btn" id="ar-wa" position="-1.5 3.0 0.1" width="0.8" height="0.8" src="#wa-tex" transparent="true"></a-plane>
    <a-text value="Toca: WhatsApp" position="-1.5 2.6 0.1" align="center" color="#1da851" scale="0.4 0.4 0.4"></a-text>
    
    <a-plane class="ar-btn" id="ar-ig" position="1.5 3.0 0.1" width="0.8" height="0.8" src="#ig-tex" transparent="true"></a-plane>
    <a-text value="Toca: Instagram" position="1.5 2.6 0.1" align="center" color="#e1306c" scale="0.4 0.4 0.4"></a-text>

    <a-plane class="ar-btn" id="ar-web" position="0 1.5 0.8" width="0.8" height="0.8" src="#web-tex" transparent="true"></a-plane>
    <a-text value="Visita mi Sitio Web" position="0 1.1 0.8" align="center" color="#fff" scale="0.45 0.45 0.45"></a-text>

  </a-marker>

  <a-entity camera>
    <a-entity cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .ar-btn;"></a-entity>
  </a-entity>
</a-scene>

<script>
  function startAR() {
    // Escondemos splash y mostramos escena AR
    document.getElementById('splash').style.display = 'none';
    const scene = document.getElementById('ar-scene');
    scene.style.display = 'block';
    document.getElementById('hint').style.display = 'block';

    // FIX CRÍTICO CLICS: Asegura que la escena cargue antes de habilitar toques
    // Esto es necesario para que el raycaster funcione en móviles.
    scene.addEventListener('loaded', function() {
        console.log("AR Scene loaded, enabling clicks...");
        const arWA = document.getElementById('ar-wa');
        const arIG = document.getElementById('ar-ig');
        const arWEB = document.getElementById('ar-web');

        if (arWA) arWA.addEventListener('click', () => { window.open('https://wa.me/50686099810', '_blank'); });
        if (arIG) arIG.addEventListener('click', () => { window.open('https://www.instagram.com/adelgadful_/', '_blank'); });
        if (arWEB) arWEB.addEventListener('click', () => { window.open('http://adelgadful.vercel.app/', '_blank'); });
    });
  }

  // Actualización de estado del marcador Hiro
  const marker = document.getElementById('marker');
  const hint = document.getElementById('hint');
  marker.addEventListener('markerFound', () => { hint.textContent = '✅ ¡Avatar detectado!'; });
  marker.addEventListener('markerLost', () => { hint.textContent = '📷 Apunta al marcador Hiro'; });
</script>
</body>
</html>
