<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arturo Delgado · AR Card</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a1628; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; color: #fff;
    }
    .logo-splash {
      width: 80px; height: 80px; border-radius: 20px;
      background: linear-gradient(135deg, #00bcd4, #0d47a1);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 900; color: #fff;
    }
    #startBtn {
      padding: 16px 40px; border: none; border-radius: 50px;
      background: linear-gradient(90deg, #00bcd4, #7c4dff);
      color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
    }

    #social-bar {
      position: fixed; bottom: 25px; left: 0; right: 0;
      display: none; justify-content: center; gap: 10px; z-index: 500; flex-wrap: wrap;
    }
    .s-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 15px; border-radius: 25px;
      font-size: .85rem; font-weight: 700; color: #fff; text-decoration: none;
    }
    .s-btn.wa { background: #1da851; }
    .s-btn.ig { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
    .s-btn.web { background: #1565c0; }

    #hint {
      position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff; padding: 10px 20px;
      border-radius: 30px; font-size: .8rem; display: none; z-index: 500; white-space: nowrap;
    }
    
    vercel-live, .vercel-toolbar, #vercel-toolbar { display: none !important; }
  </style>
</head>
<body>

<div id="splash">
  <div class="logo-splash">A</div>
  <h1 style="font-size: 1.5rem; margin:0;">Arturo Delgado</h1>
  <p style="margin:0; color:#90caf9;">Servicios Digitales</p>
  <button id="startBtn" onclick="startExperience()">🚀 Entrar a AR</button>
</div>

<div id="social-bar">
  <a class="s-btn wa" href="https://wa.me/50686099810" target="_blank">WhatsApp</a>
  <a class="s-btn ig" href="https://www.instagram.com/adelgadful_/" target="_blank">Instagram</a>
  <a class="s-btn web" href="https://adelgadful.vercel.app/" target="_blank">Mi Web</a>
</div>

<div id="hint">📷 Apunta al frente de tu tarjeta</div>

<a-scene 
  mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiScanning: no;" 
  color-management="true" 
  vr-mode-ui="enabled: false" 
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="avatar-glb" src="model.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    
    <a-gltf-model
      src="#avatar-glb"
      position="0 0 0" 
      rotation="0 0 0" 
      scale="0.6 0.6 0.6">
    </a-gltf-model>

    <a-text value="Adelgadful" position="0 1.2 0" align="center" color="#00bcd4" width="3.5"></a-text>
  </a-entity>
</a-scene>

<script>
  function startExperience() {
    // Solo ocultamos la pantalla de bienvenida y mostramos botones, la cámara ya estará funcionando atrás
    document.getElementById('splash').style.display = 'none';
    document.getElementById('social-bar').style.display = 'flex';
    document.getElementById('hint').style.display = 'block';
  }

  const target = document.getElementById('target');
  const hint = document.getElementById('hint');
  
  target.addEventListener('targetFound', () => { 
    hint.innerHTML = "✅ ¡Tarjeta detectada!";
    hint.style.background = "rgba(0, 230, 118, 0.8)";
  });
  target.addEventListener('targetLost', () => { 
    hint.innerHTML = "📷 Apunta al frente de tu tarjeta";
    hint.style.background = "rgba(0,0,0,0.7)";
  });
</script>
</body>
</html>
