<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arturo Delgado · AR Card</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at top, #0a1628 0%, #000 70%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 30px; text-align: center; color: #fff;
    }
    .logo-splash {
      width: 90px; height: 90px; border-radius: 22px;
      background: linear-gradient(135deg, #00bcd4, #0d47a1);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: 900; color: #fff;
      box-shadow: 0 0 40px rgba(0,188,212,.5);
      animation: float 3s ease-in-out infinite;
    }
    #splash h1 {
      font-size: 1.7rem; font-weight: 800;
      background: linear-gradient(90deg, #00bcd4, #7c4dff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #splash .sub { color: #90caf9; font-size: .95rem; }
    #startBtn {
      padding: 16px 44px; border: none; border-radius: 50px;
      background: linear-gradient(90deg, #00bcd4, #7c4dff);
      color: #fff; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; letter-spacing: .5px;
      box-shadow: 0 0 30px rgba(124,77,255,.5);
      animation: pulse 2s infinite;
    }
    @keyframes float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes pulse  { 0%,100%{box-shadow:0 0 20px rgba(0,188,212,.4)} 50%{box-shadow:0 0 45px rgba(124,77,255,.7)} }

    #social-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: none;
      background: linear-gradient(0deg, rgba(0,0,0,.92) 0%, transparent 100%);
      padding: 14px 10px 22px;
      justify-content: center; gap: 10px; z-index: 500; flex-wrap: wrap;
    }
    .s-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 18px; border: none; border-radius: 30px;
      font-size: .88rem; font-weight: 700; cursor: pointer; color: #fff;
      box-shadow: 0 4px 18px rgba(0,0,0,.45);
    }
    .s-btn img { width: 22px; height: 22px; border-radius: 5px; object-fit: contain; }
    .s-btn.wa   { background: #1da851; }
    .s-btn.ig   { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
    .s-btn.web  { background: #1565c0; }
    .s-btn.mail { background: #37474f; }

    #hint {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.65); color: #fff; padding: 9px 22px; border-radius: 20px;
      font-size: .82rem; display: none; z-index: 500;
    }
    
    /* ELIMINAR BARRA DE VERCEL */
    vercel-live, .vercel-toolbar, #vercel-toolbar, [data-vercel-toolbar] { 
      display: none !important; 
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    .a-enter-vr, .a-enter-ar, [data-aframe-default-vr-button] { display:none !important; }
  </style>
</head>
<body>

<div id="splash">
  <div class="logo-splash">A</div>
  <h1>Arturo Delgado</h1>
  <p class="sub">Servicios Digitales e Impresión</p>
  <button id="startBtn" onclick="startAR()">🚀 Activar Realidad Aumentada</button>
</div>

<div id="social-bar">
  <button class="s-btn wa" onclick="location.href='https://wa.me/50686099810'">
    <img src="whatapp_png_.png" alt="WA"> WhatsApp
  </button>
  <button class="s-btn ig" onclick="location.href='https://www.instagram.com/adelgadful_/'">
    <img src="instagram_png_.jpg" alt="IG"> Instagram
  </button>
  <button class="s-btn web" onclick="location.href='https://adelgadful.vercel.app/'">
    🌐 Mi Web
  </button>
  <button class="s-btn mail" onclick="location.href='mailto:adelgadful@gmail.com'">
    ✉️ Email
  </button>
</div>

<div id="hint">📷 Apunta al marcador Hiro de tu tarjeta</div>

<script>
AFRAME.registerComponent('wave-greeting', {
  init: function () {
    this.armBone = null;
    const targets = ['RightArm','mixamorigRightArm','RightForeArm','Arm_R','RightUpperArm','Wolf3D_RightHand'];
    this.el.addEventListener('model-loaded', (ev) => {
      ev.detail.model.traverse((node) => {
        if (!this.armBone && targets.some(t => node.name.toLowerCase().includes(t.toLowerCase()))) { 
          this.armBone = node; 
        }
      });
    });
  },
  tick: function (t) {
    this.el.object3D.position.y = Math.sin(t * 0.0012) * 0.04;
    if (this.armBone) {
      this.armBone.rotation.z = Math.sin(t * 0.005) * 0.9;
    }
  }
});
</script>

<a-scene id="ar-scene" style="display:none"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="logarithmicDepthBuffer: true; antialias: true; colorManagement: true;">

  <a-assets timeout="10000">
    <img id="ig-tex" src="instagram_png_.jpg">
    <img id="wa-tex" src="whatapp_png_.png">
    <a-asset-item id="avatar-glb" src="model.glb"></a-asset-item>
  </a-assets>

  <a-marker preset="hiro" id="marker">

    <a-gltf-model
      id="avatar"
      src="#avatar-glb"
      position="0 0.5 1.0"
      rotation="-35 0 0"
      scale="2.5 2.5 2.5"
      wave-greeting
      animation-mixer="clip: *; loop: repeat; timeScale: 0.9">
    </a-gltf-model>

    <a-text value="Adelgadful" position="0 9.0 0" align="center" color="#00bcd4" scale="2 2 2"></a-text>
    <a-text value="Servicios Digitales e Impresion" position="0 8.0 0" align="center" color="#fff" scale="0.8 0.8 0.8"></a-text>

    <a-ring position="0 0.02 0" rotation="-90 0 0" radius-inner="0.68" radius-outer="0.76" color="#00bcd4" opacity="0.55"></a-ring>

    <a-plane class="ar-btn" id="ar-wa" position="-1.5 3.0 0.1" width="0.8" height="0.8" src="#wa-tex" transparent="true"></a-plane>
    <a-text value="Toca: WhatsApp" position="-1.5 2.5 0.1" align="center" color="#1da851" scale="0.5 0.5 0.5"></a-text>
    
    <a-plane class="ar-btn" id="ar-ig" position="1.5 3.0 0.1" width="0.8" height="0.8" src="#ig-tex" transparent="true"></a-plane>
    <a-text value="Toca: Instagram" position="1.5 2.5 0.1" align="center" color="#e1306c" scale="0.5 0.5 0.5"></a-text>

    <a-plane class="ar-btn" id="ar-web" position="0 1.5 0.8" width="0.8" height="0.8" color="#1565c0" transparent="true"></a-plane>
    <a-text value="🌐 Visita mi Sitio Web" position="0 1.5 0.85" align="center" color="#fff" scale="0.45 0.45 0.45"></a-text>

  </a-marker>
  
  <a-entity camera>
    <a-entity cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .ar-btn;"></a-entity>
  </a-entity>
</a-scene>

<script>
  function startAR() {
    document.getElementById('splash').style.display = 'none';
    const scene = document.getElementById('ar-scene');
    scene.style.display = 'block';
    document.getElementById('social-bar').style.display = 'flex';
    document.getElementById('hint').style.display = 'block';

    // Aseguramos que los clics funcionen cuando la escena cargue
    scene.addEventListener('loaded', function() {
        const arWA = document.getElementById('ar-wa');
        const arIG = document.getElementById('ar-ig');
        const arWEB = document.getElementById('ar-web');

        if (arWA) arWA.addEventListener('click', () => { window.open('https://wa.me/50686099810', '_blank'); });
        if (arIG) arIG.addEventListener('click', () => { window.open('https://www.instagram.com/adelgadful_/', '_blank'); });
        if (arWEB) arWEB.addEventListener('click', () => { window.open('http://adelgadful.vercel.app/', '_blank'); });
    });
  }

  const marker = document.getElementById('marker');
  const hint = document.getElementById('hint');
  marker.addEventListener('markerFound', () => { hint.textContent = '✅ ¡Avatar detectado!'; });
  marker.addEventListener('markerLost', () => { hint.textContent = '📷 Apunta al marcador Hiro'; });
</script>
</body>
</html>
