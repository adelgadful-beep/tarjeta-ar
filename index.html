<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arturo Delgado · AR Card</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      margin: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background-color: transparent; /* Importante para que no tape la cámara */
    }

    /* FIX PANTALLA NEGRA: Forzamos el video al fondo */
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: -2;
    }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a1628; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; color: #fff;
    }

    #startBtn {
      padding: 16px 40px; border: none; border-radius: 50px;
      background: linear-gradient(90deg, #00bcd4, #7c4dff);
      color: #fff; font-size: 1.1rem; font-weight: bold; cursor: pointer;
    }

    #social-bar {
      position: fixed; bottom: 25px; left: 0; right: 0;
      display: none; justify-content: center; gap: 12px; z-index: 500;
    }

    .s-btn {
      padding: 12px 18px; border-radius: 30px; color: #fff;
      text-decoration: none; font-size: 0.9rem; font-weight: bold;
      background: #1565c0; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    #hint {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff; padding: 10px 25px;
      border-radius: 30px; font-size: 0.85rem; display: none; z-index: 500;
    }
    vercel-live, .vercel-toolbar, #vercel-toolbar { display: none !important; }
  </style>

  <script>
    // Script de saludo mejorado para que no falle si el hueso tiene otro nombre
    AFRAME.registerComponent('wave-greeting', {
      init: function () {
        this.armBone = null;
        this.el.addEventListener('model-loaded', () => {
          const model = this.el.getObject3D('mesh');
          model.traverse((node) => {
            if (!this.armBone && node.name.toLowerCase().includes('arm')) { 
              this.armBone = node; 
            }
          });
        });
      },
      tick: function (t) {
        if (this.armBone) {
          this.armBone.rotation.z = Math.sin(t * 0.005) * 0.7;
        }
      }
    });
  </script>
</head>
<body>

<div id="splash">
  <h1>Arturo Delgado</h1>
  <button id="startBtn" onclick="startAR()">🚀 Activar Cámara</button>
</div>

<div id="social-bar">
  <a class="s-btn" href="https://wa.me/50686099810" target="_blank">WhatsApp</a>
  <a class="s-btn" href="https://www.instagram.com/adelgadful_/" target="_blank">Instagram</a>
  <a class="s-btn" href="https://adelgadful.vercel.app/" target="_blank">🌐 Mi Web</a>
</div>

<div id="hint">📷 Apunta al frente de tu tarjeta</div>

<a-scene 
  mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no;" 
  embedded 
  color-management="true" 
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;">

  <a-assets>
    <a-asset-item id="avatar-glb" src="model.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-gltf-model
      src="#avatar-glb"
      position="0 0 0" 
      rotation="0 0 0" 
      scale="1 1 1"
      wave-greeting>
    </a-gltf-model>

    <a-text value="Adelgadful" position="0 1.2 0.1" align="center" color="#00bcd4" width="3.5"></a-text>
  </a-entity>
</a-scene>

<script>
  function startAR() {
    // Quitamos el splash y el fondo oscuro del body
    document.getElementById('splash').style.display = 'none';
    document.body.style.backgroundColor = 'transparent';
    
    const sceneEl = document.querySelector('a-scene');
    const arSystem = sceneEl.systems["mindar-image-system"];
    arSystem.start(); 

    document.getElementById('social-bar').style.display = 'flex';
    document.getElementById('hint').style.display = 'block';
  }

  const target = document.getElementById('target');
  const hint = document.getElementById('hint');
  
  target.addEventListener('targetFound', () => { 
    hint.innerHTML = "✅ ¡Tarjeta detectada!";
    hint.style.background = "rgba(0, 230, 118, 0.8)";
  });
  
  target.addEventListener('targetLost', () => { 
    hint.innerHTML = "📷 Apunta al frente de tu tarjeta";
    hint.style.background = "rgba(0,0,0,0.7)";
  });
</script>
</body>
</html>
